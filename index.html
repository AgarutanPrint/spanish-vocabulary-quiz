<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spanish Made Fun! Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#fdf6ff;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:20px}
#app{width:100%;max-width:480px;margin:0 auto}
.card{background:#fff;border-radius:20px;box-shadow:0 4px 28px rgba(0,0,0,.10);width:100%;padding:0 0 24px 0;overflow:hidden}
.menu-inner{padding:28px 24px 8px}
.brand{text-align:center;font-size:.68rem;text-transform:uppercase;letter-spacing:.13em;color:#9e9e9e;margin-bottom:6px}
.menu-card h1{font-size:1.25rem;color:#1a237e;text-align:center;margin-bottom:3px}
.menu-emoji{text-align:center;font-size:1.6rem;margin-bottom:4px}
.menu-subtitle{text-align:center;font-size:.82rem;color:#607d8b;margin-bottom:22px}
.menu-btn{display:block;width:100%;padding:13px 16px;margin:9px 0;border:none;border-radius:11px;font-size:.97rem;font-weight:700;cursor:pointer;transition:all .2s;color:#fff}
.menu-btn:hover{transform:translateY(-1px);filter:brightness(1.1)}
.stats-bar{display:flex;justify-content:space-around;padding:14px 16px 12px;border-bottom:1px solid #f0f0f0;margin-bottom:4px}
.stat-item{text-align:center;flex:1}
.stat-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.stat-label.pts{color:#f59e0b}
.stat-label.ok{color:#16a34a}
.stat-label.err{color:#dc2626}
.stat-label.pct{color:#7c3aed}
.stat-value{font-size:1.05rem;font-weight:800;color:#1a1a2e}
.sec-header{padding:14px 20px 0}
.sec-header h2{font-size:1rem;font-weight:800;color:#1a237e;display:flex;align-items:center;gap:6px}
.sec-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.sec-header p{font-size:.75rem;color:#78909c;margin-top:2px}
.progress-wrap{padding:10px 20px 14px}
.progress-row{display:flex;justify-content:space-between;font-size:.72rem;color:#9e9e9e;margin-bottom:5px}
.progress-bar-bg{background:#f0f0f0;border-radius:8px;height:6px}
.progress-bar-fill{height:6px;border-radius:8px;transition:width .35s}
.q-body{padding:0 20px}
.q-text{font-size:.97rem;font-weight:700;color:#1a1a2e;margin-bottom:14px;line-height:1.55}
.q-num{color:#7b1fa2}
.opt-btn{display:block;width:100%;text-align:left;padding:12px 16px;margin:7px 0;border:2px solid #e8e8f0;border-radius:12px;background:#f8f8fc;font-size:.92rem;cursor:pointer;transition:all .18s;color:#2d2d3a;font-weight:500}
.opt-btn:hover:not(:disabled){border-color:#7b1fa2;background:#f3e8ff;color:#4a148c}
.opt-btn.correct{border-color:#16a34a!important;background:#dcfce7!important;color:#14532d!important;font-weight:700}
.opt-btn.wrong{border-color:#dc2626!important;background:#fee2e2!important;color:#7f1d1d!important}
.opt-btn:disabled{cursor:default}
.feedback{padding:10px 14px;border-radius:10px;font-size:.88rem;font-weight:700;margin:10px 0;text-align:center}
.feedback.correct{background:#dcfce7;color:#14532d}
.feedback.wrong{background:#fee2e2;color:#7f1d1d}
.hint-btn{display:block;width:100%;padding:10px;margin:10px 0;border:2px dashed #fb8c00;border-radius:10px;background:#fff8e1;color:#e65100;font-size:.85rem;cursor:pointer;font-weight:700;transition:all .18s}
.hint-btn:hover{background:#ffe0b2}
.hint-box{background:#fff3e0;border:1.5px solid #fcd34d;border-radius:9px;padding:10px 13px;font-size:.84rem;color:#92400e;margin:8px 0;font-weight:500}
.next-btn{display:block;width:100%;padding:14px;color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:800;cursor:pointer;margin-top:12px;transition:all .2s}
.exit-btn{display:block;width:calc(100% - 40px);margin:12px 20px 0;padding:10px;background:#fff0f0;border:2px solid #ef9a9a;border-radius:11px;color:#c62828;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s}
.exit-btn:hover{background:#ef9a9a;border-color:#c62828;color:#b71c1c}
.end-wrap{padding:28px 24px 8px;text-align:center}
.end-icon{font-size:3.2rem;margin-bottom:8px}
.end-title{font-size:1.35rem;font-weight:800;color:#1a237e;margin-bottom:6px}
.end-msg{font-size:.9rem;color:#607d8b;margin-bottom:18px}
.stars{display:flex;justify-content:center;gap:7px;margin-bottom:18px}
.star{font-size:2.1rem;opacity:0;transform:scale(0);transition:all .38s cubic-bezier(.34,1.56,.64,1)}
.star.show{opacity:1;transform:scale(1)}
.end-pills{display:flex;justify-content:center;gap:9px;flex-wrap:wrap;margin-bottom:22px}
.end-pill{padding:9px 16px;border-radius:22px;font-size:.87rem;font-weight:800}
.ep-pts{background:#fef3c7;color:#92400e}
.ep-ok{background:#dcfce7;color:#14532d}
.ep-err{background:#fee2e2;color:#7f1d1d}
.ep-pct{background:#ede9fe;color:#4c1d95}
.try-btn{display:block;width:100%;padding:13px;color:#fff;border:none;border-radius:12px;font-size:.97rem;font-weight:800;cursor:pointer;margin-bottom:10px}
.menu-back-btn{display:block;width:100%;padding:12px;background:#f5f5f5;border:2px solid #d1d5db;border-radius:12px;font-size:.92rem;font-weight:700;color:#374151;cursor:pointer;margin-bottom:14px}
.review-box{background:#f5f3ff;border:2px solid #c4b5fd;border-radius:14px;padding:20px;margin-top:16px;text-align:left}
.review-box h3{font-size:.92rem;color:#1a1a2e;margin-bottom:10px;font-weight:800}
.review-box .rq{font-weight:800;font-size:.9rem;color:#1a237e;margin-bottom:10px}
.review-box p{font-size:.82rem;color:#4b5563;line-height:1.65;margin-bottom:10px}
.review-link-btn{display:block;width:100%;padding:12px;background:#1a1a2e;color:#fff;border:none;border-radius:10px;font-size:.88rem;font-weight:800;cursor:pointer;margin-bottom:8px;text-align:center;text-decoration:none;transition:background .2s}
.review-link-btn:hover{background:#2e2e4e}
</style>
</head>

function getSrc(){var p=new URLSearchParams(window.location.search);return p.get('src')||'';}
function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

var state={screen:'menu',sectionIdx:0,qIdx:0,questions:[],pts:0,correct:0,wrong:0,hintUsed:false,answered:false};

function render(){
  var app=document.getElementById('app');
  if(state.screen==='menu') app.innerHTML=renderMenu();
  else if(state.screen==='quiz') app.innerHTML=renderQuiz();
  else if(state.screen==='end') app.innerHTML=renderEnd();
  if(state.screen==='end'){
    var pct=state.questions.length>0?Math.round((state.correct/state.questions.length)*100):0;
    if(pct>=70)[0,1,2,3,4].forEach(function(i){setTimeout(function(){var el=document.getElementById('star'+i);if(el)el.classList.add('show');},200+i*180);});
  }
}

function renderMenu(){
  var btns=SECTIONS.map(function(s,i){
    return '<button class="menu-btn" style="background:'+s.grad+'" onclick="startSection('+i+')">'+s.emoji+' '+s.title+'</button>';
  }).join('');
  return '<div class="card menu-card"><div class="menu-inner"><div class="brand">Agarutan Print</div><div class="menu-emoji">\uD83C\uDF1F</div><h1>Spanish Made Fun!</h1><div class="menu-subtitle">A Vocabulary Workbook for Kids Ages 6\u201312</div>'+btns+'</div></div>';
}

function statsBar(){
  var total=state.questions.length;
  var pct=total>0?Math.round((state.correct/total)*100):0;
  return '<div class="stats-bar">'
    +'<div class="stat-item"><div class="stat-label pts">\u2B50 Points</div><div class="stat-value">'+state.pts+'</div></div>'
    +'<div class="stat-item"><div class="stat-label ok">\u2705 Correct</div><div class="stat-value">'+state.correct+'</div></div>'
    +'<div class="stat-item"><div class="stat-label err">\u274C Wrong</div><div class="stat-value">'+state.wrong+'</div></div>'
    +'<div class="stat-item"><div class="stat-label pct">\uD83C\uDFAF Score</div><div class="stat-value">'+pct+'%</div></div>'
    +'</div>';
}

function renderQuiz(){
  var sec=SECTIONS[state.sectionIdx];
  var q=state.questions[state.qIdx];
  var total=state.questions.length;
  var prog=Math.round((state.qIdx/total)*100);
  var opts=q._shuffledOpts.map(function(o,i){
    var cls='opt-btn';
    if(state.answered){if(o.c)cls+=' correct';else if(o._chosen)cls+=' wrong';}
    return '<button class="'+cls+'" '+(state.answered?'disabled':'')+' onclick="chooseOpt('+i+')">'+o.t+'</button>';
  }).join('');
  var feedback='';
  if(state.answered){
    var chose=q._shuffledOpts.filter(function(o){return o._chosen;})[0];
    feedback=chose&&chose.c
      ?'<div class="feedback correct">\u2705 Correct! +'+(state.hintUsed?5:10)+' points</div>'
      :'<div class="feedback wrong">\u274C Not quite \u2014 the correct answer is highlighted in green.</div>';
  }
  var hintHtml='';
  if(!state.answered&&!state.hintUsed) hintHtml='<button class="hint-btn" onclick="showHint()">\uD83D\uDCA1 Show Hint (\u22125 pts)</button>';
  var hintBox=state.hintUsed?'<div class="hint-box">\uD83D\uDCA1 '+q.hint+'</div>':'';
  var nextLabel=state.qIdx<total-1?'Next \u2192':'See Results';
  var nextBtn=state.answered?'<button class="next-btn" style="background:'+sec.grad+'" onclick="nextQ()">'+nextLabel+'</button>':'';
  return '<div class="card">'
    +statsBar()
    +'<div class="sec-header"><h2><span class="sec-dot" style="background:'+sec.dot+'"></span>'+sec.emoji+' '+sec.title+'</h2><p>'+sec.subtitle+'</p></div>'
    +'<div class="progress-wrap"><div class="progress-row"><span>Question '+(state.qIdx+1)+' of '+total+'</span><span>'+(state.qIdx+1)+'/'+total+'</span></div>'
    +'<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:'+prog+'%;background:'+sec.grad+'"></div></div></div>'
    +'<div class="q-body"><div class="q-text"><span class="q-num">Q'+(state.qIdx+1)+'.</span> '+q.q+'</div>'
    +opts+hintHtml+hintBox+feedback+nextBtn+'</div>'
    +'<button class="exit-btn" onclick="goMenu()">\u2715 Exit to Menu</button></div>';
}

function renderEnd(){
  var sec=SECTIONS[state.sectionIdx];
  var total=state.questions.length;
  var pct=total>0?Math.round((state.correct/total)*100):0;
  var src=getSrc();
  var isMastery=sec.id==='mastery';
  var starHtml='<div class="stars">'+[0,1,2,3,4].map(function(i){return '<span class="star" id="star'+i+'">\u2B50</span>';}).join('')+'</div>';
  var celebration='';
  if(pct===100) celebration='<div class="end-icon">\uD83C\uDFC6</div><div class="end-title">\uD83C\uDFC6 Spectacular!</div>'+starHtml+'<div class="end-msg">Perfect score! \u00a1Excelente!</div>';
  else if(pct>=85) celebration='<div class="end-icon">\u2B50</div><div class="end-title">\u2B50 Excellent!</div>'+starHtml+'<div class="end-msg">You scored '+pct+'% \u2014 \u00a1Muy bien!</div>';
  else if(pct>=70) celebration='<div class="end-icon">\uD83C\uDF1F</div><div class="end-title">\uD83C\uDF1F Great Job!</div>'+starHtml+'<div class="end-msg">You scored '+pct+'% \u2014 \u00a1Bien hecho!</div>';
  else celebration='<div class="end-icon">\uD83D\uDCAA</div><div class="end-title">Keep Practicing!</div><div class="end-msg">You got '+pct+'%. \u00a1S\u00ed puedes! \u2014 Review and try again!</div>';
  var pills='<div class="end-pills"><span class="end-pill ep-pts">\uD83C\uDFC5 '+state.pts+' pts</span><span class="end-pill ep-ok">\u2705 '+state.correct+'</span><span class="end-pill ep-err">\u274C '+state.wrong+'</span><span class="end-pill ep-pct">\uD83C\uDFAF '+pct+'%</span></div>';
  var reviewBox='';
  if(isMastery&&pct>=70&&src){
    var btns='';
    if(src==='etsy') btns='<a class="review-link-btn" href="https://www.etsy.com/your/purchases" target="_blank">\u2B50 Leave a Review on Etsy</a>';
    else if(src==='amazon') btns='<a class="review-link-btn" href="https://www.amazon.com/review/create-review?asin='+PAPERBACK_ASIN+'" target="_blank">\u2B50 Review Paperback on Amazon</a>'+(HARDCOVER_ASIN?'<a class="review-link-btn" href="https://www.amazon.com/review/create-review?asin='+HARDCOVER_ASIN+'" target="_blank">\u2B50 Review Hardcover on Amazon</a>':'');
    reviewBox='<div class="review-box"><h3>\uD83D\uDD12 Notice: For Parents &amp; Educators</h3><div class="rq">How did you like this complete resource bundle?</div><p>Thank you for choosing Agarutan Print! We hope this combination of printable worksheets, the digital fillable PDF, and the interactive quiz bonus is helping to build your student\'s skills.</p><p>If this comprehensive resource bundle added value to your student\'s learning experience, please take a brief moment to share your feedback. Your review helps us continue creating high-quality learning assets!</p>'+btns+'</div>';
  }
  return '<div class="card"><div class="end-wrap">'+celebration+pills
    +'<button class="try-btn" style="background:'+sec.grad+'" onclick="startSection('+state.sectionIdx+')">\uD83D\uDD04 Try Again</button>'
    +'<button class="menu-back-btn" onclick="goMenu()">\uD83C\uDFE0 Back to Menu</button>'
    +reviewBox+'</div></div>';
}

window.startSection=function(idx){
  var sec=SECTIONS[idx];
  var qs=shuffle(sec.questions).map(function(q){
    return {q:q.q,hint:q.hint,_shuffledOpts:shuffle(q.options.map(function(o){return {t:o.t,c:o.c,_chosen:false};}))};
  });
  state={screen:'quiz',sectionIdx:idx,qIdx:0,questions:qs,pts:0,correct:0,wrong:0,hintUsed:false,answered:false};
  render();
};
window.chooseOpt=function(i){
  if(state.answered) return;
  var q=state.questions[state.qIdx];
  q._shuffledOpts[i]._chosen=true;
  state.answered=true;
  if(q._shuffledOpts[i].c){state.pts+=state.hintUsed?5:10;state.correct++;}
  else state.wrong++;
  render();
};
window.showHint=function(){state.hintUsed=true;render();};
window.nextQ=function(){state.qIdx++;state.answered=false;state.hintUsed=false;if(state.qIdx>=state.questions.length)state.screen='end';render();};
window.goMenu=function(){state.screen='menu';render();};
render();
</script>
